name: Feature Request
description: Suggest a new feature or improvement for libexcessive.
title: "[Feature]: "
labels: ["enhancement", "triage"]
assignees:
  - komozoi
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to suggest a new feature!
  - type: textarea
    id: feature-description
    attributes:
      label: Feature Description
      description: What would you like to see added or improved?
      placeholder: I would like libexcessive to support...
    validations:
      required: true
  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: Why is this feature needed, and how will it be used?
      placeholder: This would be useful when...
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any other ways you've thought about achieving this?
      placeholder: I tried using X, but Y was missing.
    validations:
      required: false
  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other context or screenshots about the feature request here.
    validations:
      required: false
