name: Publish Wiki Docs to GitHub Pages

on:
  push:
    branches: [ "master" ]
    paths:
      - 'docs/wiki/**'
  pull_request:
    branches: [ "master" ]
    paths:
      - 'docs/wiki/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare Docs
        run: |
          mkdir -p _site
          cp docs/wiki/*.md _site/
          echo "title: LibExcessive: High-Performance Persistent Datastructures in C++" > _site/_config.yml
          echo "baseurl: /libexcessive" >> _site/_config.yml

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
